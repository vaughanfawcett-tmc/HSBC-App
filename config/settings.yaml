# Everything non-mapping lives here. Editable by non-developers.
# Placeholders must be confirmed with Bethany / Harrison during setup.

email:
  # The HSBC contact who receives the monthly report.
  recipient: "andrewmaher@hsbc.com"
  cc: []
  # The mailbox the app sends FROM. Whoever signs in via the device-code
  # prompt MUST match this address — if not, the app refuses to send. This
  # stops a colleague accidentally signing in as themselves on the shared URL
  # and the email going from the wrong account.
  expected_sender_email: "bethany.howden@tmc.co.uk"
  sender_display_name: "Bethany Howden, TMC"
  subject_template: "HSBC SLA Report — {month_label}"
  body_template: |
    Hi Andrew,

    Please find attached the HSBC SLA report for {month_label}.

    Best regards,
    Bethany

  # Test mode reroutes every send to test_recipient. PRODUCTION = false.
  # Flip to true if you ever need to test against a non-HSBC mailbox again.
  test_mode: false
  test_recipient: "vaughanfawcett1@gmail.com"

filters:
  # Groups to exclude from the Services section (applied before client
  # assignment). "Updates" is the DVLA automated stream — confirmed in brief.
  exclude_groups:
    - "Updates"

  # Rules that identify a "Call back" ticket. The services rule is applied
  # FIRST — callbacks are picked OUT of the remaining pool.
  #
  # Accepts EITHER a single {field, match} object OR a list of them. A row
  # is treated as a callback if ANY rule matches. Add more rules here as you
  # discover callbacks that the current patterns miss.
  callback_rule:
    - field: "Subject"
      match: ".*call\\s*back.*"
    - field: "Subject"
      match: ".*phone\\s*back.*"
    - field: "Subject"
      match: ".*return\\s*call.*"
    - field: "Group"
      match: "(?i)^call\\s*backs?$"

# Which CSV column identifies the sender — used when listing unmapped rows
# back to the reviewer. "Full name" is the default; switch to "Contact ID"
# if Bethany says email is more reliable.
identifier_field: "Full name"

# File paths are relative to the project root.
template_path: "templates/HSBC_SLA_template.xlsx"
output_dir: "output"
audit_log_path: "audit_log.csv"
