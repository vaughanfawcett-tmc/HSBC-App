# Map a Fresh CRM ticket to an HSBC-report client.
#
# For each ticket the processor walks the list top-down and assigns the first
# client whose any rule matches. Unmatched rows land in an <UNMAPPED> bucket
# and the UI asks the reviewer to edit this file.
#
# Rule shape:
#   - field: the CSV column to check (case-sensitive column name)
#   - match: a regex (case-insensitive, .* needed for "contains")
#
# Editable by non-developers. Keep one entry per client row in the template.
# The `name` MUST match column B of the template exactly.
#
# IMPORTANT: the starter rules below are placeholders seeded from the March
# 2026 CSV's email domains. They must be confirmed with Bethany during the
# setup interview — see README.md "Setup interview".

clients:
